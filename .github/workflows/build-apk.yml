name: Build Block Dodge APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Android SDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy www files into Android project
        run: npx cap copy android

      - name: Verify www files are in Android assets
        run: |
          echo "=== Checking assets ==="
          ls android/app/src/main/assets/public/ || echo "WARNING: public folder missing!"
          cat android/app/src/main/assets/public/index.html | head -20 || echo "WARNING: index.html missing!"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BlockDodge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
