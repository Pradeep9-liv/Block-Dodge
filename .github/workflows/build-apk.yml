name: Build Block Dodge APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Android SDK build tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Cordova 13
        run: npm install -g cordova@13.0.0

      - name: Install project dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Copy build-extras.gradle to fix appcompat bug
        run: cp extras/android/build-extras.gradle platforms/android/app/build-extras.gradle

      - name: Build debug APK
        run: cordova build android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BlockDodge-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
