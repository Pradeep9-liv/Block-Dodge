name: Build Block Dodge APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Android SDK build tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Cordova 13
        run: npm install -g cordova@13.0.0

      - name: Install project dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Patch broken appcompat-1.6.1 color resource
        run: |
          FILE=$(find $HOME/.gradle/caches -path "*/appcompat-1.6.1/res/values/values.xml" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            echo "Patching: $FILE"
            # Replace the broken ?attr/colorPrimary color reference with a plain hex value
            sed -i 's|<color name="abc_tint_default">?attr/colorPrimary</color>|<color name="abc_tint_default">#FF6200EE</color>|g' "$FILE"
            sed -i 's|<color name="[^"]*">?attr/[^<]*</color>|<!-- removed invalid attr color ref -->|g' "$FILE"
            echo "Patch applied."
          else
            echo "appcompat file not found in gradle cache, searching wider..."
            find $HOME/.gradle -name "values.xml" | xargs grep -l "?attr/colorPrimary" 2>/dev/null | while read f; do
              echo "Patching $f"
              sed -i 's|<color name="[^"]*">?attr/[^<]*</color>|<!-- removed invalid attr color ref -->|g' "$f"
            done
          fi

      - name: Build debug APK
        run: cordova build android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BlockDodge-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
