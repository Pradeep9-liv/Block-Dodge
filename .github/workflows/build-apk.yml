name: Build Block Dodge APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Install Android SDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Copy app icons into Android mipmap folders
        run: |
          MIPMAP=android/app/src/main/res
          mkdir -p $MIPMAP/mipmap-mdpi
          mkdir -p $MIPMAP/mipmap-hdpi
          mkdir -p $MIPMAP/mipmap-xhdpi
          mkdir -p $MIPMAP/mipmap-xxhdpi
          mkdir -p $MIPMAP/mipmap-xxxhdpi
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-xhdpi/ic_launcher.png
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-xhdpi/ic_launcher_round.png
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-mdpi/ic_launcher.png
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-mdpi/ic_launcher_round.png
          cp res/icon/android/icon-144.png $MIPMAP/mipmap-xxhdpi/ic_launcher.png
          cp res/icon/android/icon-144.png $MIPMAP/mipmap-xxhdpi/ic_launcher_round.png
          cp res/icon/android/icon-192.png $MIPMAP/mipmap-xxxhdpi/ic_launcher.png
          cp res/icon/android/icon-192.png $MIPMAP/mipmap-xxxhdpi/ic_launcher_round.png
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-hdpi/ic_launcher.png
          cp res/icon/android/icon-96.png  $MIPMAP/mipmap-hdpi/ic_launcher_round.png
          echo "Icons copied!"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: BlockDodge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
